user:
  name: "Your Full Name"
  personal_email: "you@gmail.com"
  career_email: "you@careermail.com"  # optional, must be set up in Gmail "Send mail as"

gmail:
  # Simple label:
  #   query: "label:MyLabel"
  # Label with spaces ("Job Search"):
  #   query: "label:Job-Search"
  # Sub-label ("Job Search/Applications"):
  #   query: "label:Job-Search-Applications"
  # To find the exact string: search by label in Gmail, copy the query it generates.
  # You can also mix with filters: "label:Job-Search -unsubscribe"
  query: "label:JobSearch"
  lookback_days: 60
  processing_labels:
    root: "application-tracker"
    stages:
      processed: "processed"

google_sheets:
  spreadsheet_id: "YOUR_SPREADSHEET_ID_HERE"
  sheet_name: "Applications"

gemini:
  api_key: "AIza..."
  models:
    - "gemini-2.5-flash-lite"
    - "gemini-2.5-flash"
    # Web contact discovery uses Gemini Google Search grounding on the free tier.
    # Keep at least one of the two models above in this list.
  grouping_batch_size: 25
  rate_limit_max_wait_seconds: 60
  rate_limit_max_retries_per_batch: 2

thresholds:
  follow_up_days: 8
  withdraw_days: 16
  follow_up_repeat_days: 7
  deletion_request_days: 0

templates:
  follow_up:  "templates/follow_up.txt"
  withdrawal: "templates/withdrawal.txt"
